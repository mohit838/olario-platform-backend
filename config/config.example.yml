env: local

app:
  name: olario-platform-backend
  version: 0.1.0

http:
  addr: ":8080"
  read_header_timeout: 5s
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  request_timeout: 10s
  shutdown_timeout: 10s
  rate_limit_requests: 60
  rate_limit_window: 1m

database:
  driver: postgres
  dsn: "postgres://<user>:<password>@<host>:<port>/<database>?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 25
  max_idle_time: 15m

redis:
  addr: "<host>:<port>"
  username: "<username>"
  password: "<password>"
  db: 0

minio:
  endpoint: "<host>:<port>"
  access_key: "<access-key>"
  secret_key: "<secret-key>"
  bucket: "<bucket-name>"
  use_ssl: false

auth:
  access_token_secret: "<access-token-secret>"
  refresh_token_secret: "<refresh-token-secret>"
  access_token_ttl: 15m
  refresh_token_ttl: 168h

smtp:
  host: "<smtp-host>"
  port: 587
  secure: true
  user: "<smtp-user>"
  password: "<smtp-password>"
  from_address: "<from-address>"

docs:
  swagger_enabled: false
  swagger_username: "superadmin"
  swagger_password: "<swagger-password>"
